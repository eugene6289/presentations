<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600&family=JetBrains+Mono&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding: 60px 40px; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #61dafb; margin-bottom: 8px; letter-spacing: 0.04em; }
    .sub { font-size: 0.8rem; color: #555; margin-bottom: 48px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 960px; }
    .card {
      display: block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 22px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover { border-color: #61dafb; background: #1e2a2e; }
    .card .tag { font-size: 0.6rem; font-family: 'JetBrains Mono', monospace; color: #f7c948; background: rgba(247,201,72,0.1); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
    .card .tag.template { color: #38bdf8; background: rgba(56,189,248,0.1); }
    .card .title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .card .desc { font-size: 0.72rem; color: #666; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Presentations</h1>
  <p class="sub">eugene6289 · 簡報清單</p>

  <div class="grid">
    <a class="card" href="deploy/presentation.html">
      <span class="tag">SKILL</span>
      <div class="title">Deploy Skill 架構設計</div>
      <div class="desc">三層分離架構設計、Orchestrator / Flows / Behaviors 分層說明，含實際操作 Demo。</div>
    </a>
    <a class="card" href="web-improvement/presentation.html">
      <span class="tag">REPORT</span>
      <div class="title">網頁提升計畫進度報告</div>
      <div class="desc">網頁 &amp; 工具組每月進度匯報：部署流程優化、AI Skills 研發、Repo 健康度與時程回顧。</div>
    </a>
    <a class="card" href="presentation-skill/template.html">
      <span class="tag template">TEMPLATE</span>
      <div class="title">Dark Report Deck · Skill</div>
      <div class="desc">可編輯式 skill：深色 16:9 內部進度報告 deck 樣板，含設計系統與元件目錄（見 SKILL.md）。</div>
    </a>
  </div>
</body>
</html>
