<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- =====================================================================
     dark-report-deck — template.html
     ---------------------------------------------------------------------
     Editable skill template. See ./SKILL.md for the design system,
     component catalog, and editing guide.

     QUICK EDIT MAP
       ▸ <title>            → deck title shown in browser tab
       ▸ .corner-brand      → top-right brand strip
       ▸ :root tokens       → color / size system (section 4 in SKILL.md)
       ▸ slideData          → ALL slide content lives here
       ▸ renderers[]        → slide order
     ===================================================================== -->
<title>Dark Report Deck · Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ===== Design tokens — edit here to re-tone the whole deck ===== */
  :root {
    --bg: #0d0d0d;
    --bg-2: #141414;
    --bg-3: #1a1a1a;
    --border: #262626;
    --border-2: #333;
    --text: #f5f5f5;
    --text-dim: #a3a3a3;
    --text-mute: #737373;
    --accent: #38bdf8;       /* sky — interactive + in-progress */
    --accent-2: #10b981;     /* emerald — success / done */
    --accent-warn: #fbbf24;
    --accent-danger: #f43f5e;

    --slide-w: 1280px;
    --slide-h: 720px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* ===== Stage / slide framing ===== */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .slide-wrap {
    width: var(--slide-w);
    height: var(--slide-h);
    transform-origin: center center;
    position: relative;
  }
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    padding: 48px 64px;
    background: var(--bg);
    display: none;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.35s ease;
    font-size: 18px;
  }
  .slide.active { display: flex; opacity: 1; }

  /* ===== Cover slide ===== */
  .cover-slide {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    background:
      radial-gradient(1000px 500px at 30% 30%, rgba(56,189,248,0.08), transparent 60%),
      radial-gradient(800px 400px at 80% 80%, rgba(16,185,129,0.06), transparent 60%);
  }
  .cover-center { display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .cover-rule { width: 72px; height: 4px; background: var(--accent); border-radius: 999px; }
  .cover-title {
    margin: 0;
    font-size: 68px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: 0.02em;
    text-align: center;
  }
  .cover-date-bottom {
    position: absolute;
    bottom: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.22em;
    color: var(--text-mute);
  }

  /* ===== Header band (shared by all content slides) ===== */
  .slide-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .slide-header .left { display: flex; flex-direction: column; gap: 6px; }
  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .slide-title { font-size: 36px; font-weight: 600; letter-spacing: -0.01em; margin: 0; line-height: 1.15; }
  .slide-subtitle { font-size: 17px; color: var(--text-dim); margin-top: 4px; font-weight: 400; }
  .slide-header .right {
    text-align: right;
    color: var(--text-mute);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  .slide-body { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

  /* ===== Generic cards ===== */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
  }
  .card-title {
    font-size: 14px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* ===== KPI dashboard (slide 1) ===== */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
  .kpi {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 26px 26px;
    position: relative;
    overflow: hidden;
  }
  .kpi .label { font-size: 14px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; }
  .kpi .value { font-size: 38px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
  .kpi .value.accent { color: var(--accent); }
  .kpi .value.success { color: var(--accent-2); }
  .kpi .hint { font-size: 14px; color: var(--text-dim); margin-top: 10px; }
  .kpi.highlight {
    background: linear-gradient(135deg, rgba(56,189,248,0.08), rgba(16,185,129,0.04));
    border-color: rgba(56,189,248,0.35);
  }

  .highlight-card { flex: 1; display: flex; flex-direction: column; padding: 28px 32px; }
  .highlight-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 14px; }
  .highlight-list li {
    position: relative;
    padding-left: 26px;
    font-size: 18px;
    color: var(--text);
    line-height: 1.6;
  }
  .highlight-list li::before {
    content: '';
    position: absolute;
    left: 4px; top: 11px;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 999px;
  }
  .highlight-list li:first-child::before { background: var(--accent-2); }

  /* ===== Tables (progress / matrix) ===== */
  .table { width: 100%; border-collapse: collapse; font-size: 16px; }
  .table thead th {
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-3);
  }
  .table tbody td { padding: 14px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
  .table tbody tr:last-child td { border-bottom: none; }
  .table .name-cell { font-weight: 600; }
  .table .owner-cell { color: var(--text-dim); }
  .table .date-cell { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

  /* Progress bars */
  .pbar-cell { width: 130px; }
  .pbar { position: relative; height: 7px; background: #1f1f1f; border-radius: 999px; overflow: hidden; }
  .pbar > span { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 999px; }
  .pbar.done > span { background: var(--accent-2); }
  .pbar.partial > span { background: var(--accent); }
  .pbar.idle > span { background: var(--text-mute); opacity: 0.5; }
  .pbar-label { margin-top: 5px; font-size: 13px; color: var(--text-mute); font-family: 'JetBrains Mono', monospace; }

  /* ===== Status pill — FILLED tag (no border). See SKILL.md §5 ===== */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
  }
  .pill.done { color: var(--accent-2); background: rgba(16,185,129,0.14); }
  .pill.progress { color: var(--accent); background: rgba(56,189,248,0.14); }
  .pill.dot::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 999px;
    background: currentColor;
  }

  /* ===== Section strip ===== */
  .section-strip { display: flex; align-items: center; justify-content: space-between; margin: 6px 0 10px; }
  .section-strip .lbl { font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .section-strip .lbl.dim { color: var(--text-mute); }
  .section-strip .meta { font-size: 14px; color: var(--text-mute); font-family: 'JetBrains Mono', monospace; }
  .phase-block { margin-bottom: 16px; }

  /* ===== Phase / focus cards (slide 2b) ===== */
  .p2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .p2-grid-tall { flex: 1; align-items: stretch; }
  .p2-grid-tall .p2-card { padding: 32px 36px; gap: 18px; }
  .p2-grid-tall .p2-title { font-size: 24px; }
  .p2-grid-tall .p2-row { font-size: 16px; }
  .p2-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .p2-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .p2-title { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 2px; }
  .p2-owner { font-size: 13px; color: var(--text-mute); font-family: 'JetBrains Mono', monospace; }
  .p2-row { display: flex; gap: 12px; font-size: 15px; line-height: 1.5; }
  .p2-label {
    flex: 0 0 78px;
    color: var(--text-mute);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    padding-top: 4px;
  }
  .p2-text { color: var(--text); flex: 1; }
  .p2-bars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 4px; }
  .p2-blabel { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-mute); margin-bottom: 6px; }

  /* ===== Repo health grid (slide 3) ===== */
  .repo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; flex: 1; }
  .repo-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .repo-card .row { display: flex; align-items: baseline; gap: 10px; }
  .repo-card .type { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .repo-card .repo-name { font-size: 21px; font-weight: 600; letter-spacing: -0.01em; }
  .repo-card .tech { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-dim); }
  .repo-card .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
  .repo-stat { background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .repo-stat .h { font-size: 12px; color: var(--text-mute); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .repo-stat .v { font-size: 14px; color: var(--text); font-family: 'JetBrains Mono', monospace; line-height: 1.45; }

  /* ===== Skills matrix (slide 4) ===== */
  .matrix-wrap { display: grid; grid-template-columns: 1.7fr 1fr; gap: 22px; flex: 1; min-height: 0; }
  .matrix .check { text-align: center; font-size: 18px; color: var(--accent-2); }
  .matrix .check.no { color: var(--text-mute); }
  .matrix td.note { color: var(--text-dim); font-size: 14px; line-height: 1.45; }
  .matrix tbody tr.linkable { transition: background 0.15s ease; }
  .matrix tbody tr.linkable:hover { background: rgba(56,189,248,0.04); }
  .action-cell { text-align: center; }

  /* ===== Buttons — OUTLINED. See SKILL.md §5 =====
     All "可按" elements (links, modal openers, nav) share this language. */
  .row-action {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.45);
    color: var(--accent);
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.03em;
    padding: 6px 13px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .row-action:hover {
    background: rgba(56,189,248,0.18);
    border-color: var(--accent);
    color: #fff;
    transform: translateY(-1px);
  }
  .row-action-arrow { font-size: 13px; font-weight: 700; line-height: 1; }
  .row-action-empty { display: inline-block; font-size: 12px; color: var(--text-mute); letter-spacing: 0.05em; }

  .open-modal-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.45);
    color: var(--accent);
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .open-modal-btn:hover {
    background: rgba(56,189,248,0.18);
    border-color: var(--accent);
    color: #fff;
  }
  .open-modal-btn .icon { font-size: 16px; line-height: 1; }

  /* ===== Timeline (slide 5) ===== */
  .timeline { position: relative; padding-left: 28px; flex: 1; overflow: hidden; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px; top: 6px; bottom: 6px;
    width: 1px;
    background: var(--border-2);
  }
  .tl-item { position: relative; padding: 10px 0 22px 8px; }
  .tl-item::before {
    content: '';
    position: absolute;
    left: -23px; top: 18px;
    width: 10px; height: 10px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(56,189,248,0.15);
  }
  .tl-item.success::before { background: var(--accent-2); box-shadow: 0 0 0 4px rgba(16,185,129,0.15); }
  .tl-item.current::before {
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(56,189,248,0.25), 0 0 14px rgba(56,189,248,0.45);
  }
  .now-tag {
    display: inline-block;
    margin-left: 10px;
    background: var(--accent);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 2px 8px;
    border-radius: 4px;
    vertical-align: middle;
  }
  .tl-item .when {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .tl-item.success .when { color: var(--accent-2); }
  .tl-item .what { font-size: 20px; font-weight: 600; margin: 6px 0 6px; letter-spacing: -0.01em; }
  .tl-item .detail { font-size: 16px; color: var(--text-dim); line-height: 1.65; }

  /* ===== Bottom nav ===== */
  .nav {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(20,20,20,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    z-index: 50;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .nav button {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-2);
    border-radius: 999px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav button:hover {
    background: rgba(56,189,248,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav .pos { min-width: 50px; text-align: center; letter-spacing: 0.08em; }
  .nav .dots { display: flex; gap: 6px; }
  .nav .dots span { width: 6px; height: 6px; border-radius: 999px; background: var(--border-2); transition: all 0.2s; }
  .nav .dots span.active { background: var(--accent); width: 18px; }

  .corner-brand {
    position: fixed;
    top: 14px;
    right: 18px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-mute);
    letter-spacing: 0.1em;
    z-index: 40;
  }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s ease;
    padding: 32px;
  }
  .modal-overlay.open { display: flex; opacity: 1; }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 16px;
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 36px 40px;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    transform: translateY(10px) scale(0.98);
    transition: transform 0.2s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: transparent;
    border: 1px solid var(--border-2);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 999px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    background: rgba(56,189,248,0.12);
    color: var(--accent);
    border-color: var(--accent);
  }
  .modal-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .modal-title { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 6px; }
  .modal-subtitle { font-size: 15px; color: var(--text-dim); margin-bottom: 24px; }
  .modal-list { display: flex; flex-direction: column; gap: 12px; }
  .modal-std {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .modal-std .n { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 4px; }
  .modal-std .t { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .modal-std .d { font-size: 14px; color: var(--text-dim); line-height: 1.6; }

  /* ===== Legend / misc ===== */
  .legend { display: flex; gap: 18px; font-size: 13px; color: var(--text-mute); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 10px; height: 10px; border-radius: 3px; background: var(--accent); }
  .legend .swatch.s2 { background: var(--accent-2); }
  .legend .swatch.s3 { background: var(--text-mute); opacity: 0.5; }

  .pmini { display: inline-flex; flex-direction: column; gap: 2px; min-width: 96px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .muted { color: var(--text-mute); }
</style>
</head>
<body>

<div class="corner-brand">REPORT · TEMPLATE</div>

<div class="stage" id="stage">
  <div class="slide-wrap" id="slideWrap">
    <!-- Slides injected by JS -->
  </div>
</div>

<div class="nav">
  <button id="prevBtn" aria-label="prev">‹</button>
  <span class="pos" id="navPos">01 / 07</span>
  <div class="dots" id="navDots"></div>
  <button id="nextBtn" aria-label="next">›</button>
</div>

<!-- Standards modal (used by slide 4) -->
<div class="modal-overlay" id="standardsModal" onclick="if(event.target===this) closeStandardsModal()">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" onclick="closeStandardsModal()" aria-label="close">✕</button>
    <div class="modal-eyebrow">Definition of Done</div>
    <h2 class="modal-title" id="modalTitle">驗收標準</h2>
    <p class="modal-subtitle">替換為你的標準說明。</p>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

<script>
/* ============================================================================
 *  SLIDE DATA — *** EDIT THIS BLOCK ONLY ***
 *  Each top-level key is consumed by exactly one renderer below.
 *  See SKILL.md §6 for the data shape of every component.
 * ========================================================================== */
const slideData = {
  // 0. 封面
  cover: {
    title: "簡報標題",
    date: "YYYY / MM / DD"
  },

  // 1. 總覽儀表板（KPI + 摘要）
  overview: {
    title: "主標題",
    subtitle: "副標題 · 區段說明",
    lastUpdated: "YYYY/MM/DD",

/* ============================================================================
 *  RENDERERS — pure functions, slideData → HTML string
 *  Edit only when adding new component types or new slides.
 * ========================================================================== */
const esc = (s) => String(s ?? '')
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

const progressBar = (pct) => {
  const v = Math.max(0, Math.min(100, Number(pct) || 0));
  const cls = v >= 100 ? 'done' : v > 0 ? 'partial' : 'idle';
  return `
    <div class="pmini">
      <div class="pbar ${cls}"><span style="width:${v}%"></span></div>
      <div class="pbar-label">${v}%</div>
    </div>`;
};
const progressBarSlim = (pct) => {
  const v = Math.max(0, Math.min(100, Number(pct) || 0));
  const cls = v >= 100 ? 'done' : v > 0 ? 'partial' : 'idle';
  return `<div class="pbar ${cls}"><span style="width:${v}%"></span></div>`;
};
const statusPill = (status) => {
  const isDone = String(status).includes('完成');
  const cls = isDone ? 'done dot' : 'progress dot';
  return `<span class="pill ${cls}">${esc(status)}</span>`;
};

/* ============================================================================
 *  RENDERER ORDER — reorder, add, or remove slides here
 *  Each entry = one slide. The array index becomes the slide index.
 * ========================================================================== */

  renderSlideCover,  // 0 — 封面
  renderSlide1,      // 1 — KPI 儀表板
  renderSlide2,      // 2 — 進度表
  renderSlide3,      // 3 — Repo 健康度
  renderSlide2b,     // 4 — 重點卡片
  renderSlide4,      // 5 — 矩陣 + Modal
  renderSlide5       // 6 — 時間軸
];

/* ============================================================================
 *  MOUNT + NAVIGATION — generally no need to edit below this line
 * ========================================================================== */
let currentIndex = 0;

function mount() {
  const wrap = document.getElementById('slideWrap');
  wrap.innerHTML = renderers.map((fn, i) => `
    <section class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">${fn()}</section>
  `).join('');

  const dots = document.getElementById('navDots');
  dots.innerHTML = renderers.map((_, i) => `<span class="${i===0?'active':''}" data-i="${i}"></span>`).join('');
  dots.querySelectorAll('span').forEach(el => {
    el.addEventListener('click', () => goTo(Number(el.dataset.i)));
  });

  document.getElementById('prevBtn').addEventListener('click', prev);
  document.getElementById('nextBtn').addEventListener('click', next);

  document.addEventListener('keydown', (e) => {
    const modalOpen = document.getElementById('standardsModal').classList.contains('open');
    if (e.key === 'Escape' && modalOpen) { e.preventDefault(); closeStandardsModal(); return; }
    if (modalOpen) return;
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
    if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    if (e.key === 'End') { e.preventDefault(); goTo(renderers.length - 1); }
  });

  // Pre-populate modal list once
  const modalList = document.getElementById('modalList');
  modalList.innerHTML = slideData.matrix.standards.map((st, i) => `
    <div class="modal-std">
      <div class="n">${String(i+1).padStart(2,'0')}</div>
      <div class="t">${esc(st.name)}</div>
      <div class="d">${esc(st.criterion)}</div>
    </div>`).join('');

  updateNav();
  fitStage();
  window.addEventListener('resize', fitStage);
}

function goTo(i) {
  if (i < 0 || i >= renderers.length || i === currentIndex) return;
  const slides = document.querySelectorAll('.slide');
  slides[currentIndex].classList.remove('active');
  slides[i].classList.add('active');
  currentIndex = i;
  updateNav();
}
function next() { goTo(currentIndex + 1); }
function prev() { goTo(currentIndex - 1); }

function updateNav() {
  document.getElementById('navPos').textContent =
    `${String(currentIndex+1).padStart(2,'0')} / ${String(renderers.length).padStart(2,'0')}`;
  document.querySelectorAll('.nav .dots span').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
  });
}

function fitStage() {
  const wrap = document.getElementById('slideWrap');
  const stage = document.getElementById('stage');
  const sw = wrap.offsetWidth, sh = wrap.offsetHeight;
  const vw = stage.offsetWidth - 40, vh = stage.offsetHeight - 80;
  const scale = Math.min(vw / sw, vh / sh, 1);
  wrap.style.transform = `scale(${scale})`;
}

function openStandardsModal() { document.getElementById('standardsModal').classList.add('open'); }
function closeStandardsModal() { document.getElementById('standardsModal').classList.remove('open'); }
window.openStandardsModal = openStandardsModal;
window.closeStandardsModal = closeStandardsModal;

document.addEventListener('DOMContentLoaded', mount);
</script>
