<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運作效率與 AI 研發進度報告 · 2026/05</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --bg-2: #141414;
    --bg-3: #1a1a1a;
    --border: #262626;
    --border-2: #333;
    --text: #f5f5f5;
    --text-dim: #a3a3a3;
    --text-mute: #737373;
    --accent: #38bdf8;     /* sky */
    --accent-2: #10b981;   /* emerald */
    --accent-warn: #fbbf24;
    --accent-danger: #f43f5e;

    --slide-w: 1280px;
    --slide-h: 720px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* Stage / slide framing — fixed 16:9, scales to viewport */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .slide-wrap {
    width: var(--slide-w);
    height: var(--slide-h);
    transform-origin: center center;
    position: relative;
  }
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    padding: 48px 64px;
    background: var(--bg);
    display: none;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.35s ease;
    font-size: 18px;
  }
  .slide.active {
    display: flex;
    opacity: 1;
  }

  /* ========== Cover slide ========== */
  .cover-slide {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background:
      radial-gradient(1000px 500px at 30% 30%, rgba(56,189,248,0.08), transparent 60%),
      radial-gradient(800px 400px at 80% 80%, rgba(16,185,129,0.06), transparent 60%);
  }
  .cover-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }
  .cover-rule {
    width: 72px;
    height: 4px;
    background: var(--accent);
    border-radius: 999px;
  }
  .cover-title {
    margin: 0;
    font-size: 68px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: 0.02em;
    color: var(--text);
    text-align: center;
  }
  .cover-date-bottom {
    position: absolute;
    bottom: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.22em;
    color: var(--text-mute);
  }

  /* Header band */
  .slide-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .slide-header .left { display: flex; flex-direction: column; gap: 6px; }
  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .slide-title {
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
    line-height: 1.15;
  }
  .slide-subtitle {
    font-size: 17px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 400;
  }
  .slide-header .right {
    text-align: right;
    color: var(--text-mute);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Body grows */
  .slide-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  /* Generic cards */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
  }
  .card-title {
    font-size: 14px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* ========== Slide 1: dashboard ========== */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 26px 26px;
    position: relative;
    overflow: hidden;
  }
  .kpi .label {
    font-size: 14px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }
  .kpi .value {
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .kpi .value.accent { color: var(--accent); }
  .kpi .value.success { color: var(--accent-2); }
  .kpi .hint {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 10px;
  }
  .kpi.highlight {
    background: linear-gradient(135deg, rgba(56,189,248,0.08), rgba(16,185,129,0.04));
    border-color: rgba(56,189,248,0.35);
  }

  .focus-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
  }
  .focus-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 30px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
  }
  .focus-card .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .focus-card.success .badge { color: var(--accent-2); }
  .focus-card h3 {
    margin: 0;
    font-size: 23px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .focus-card p {
    margin: 0;
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1.65;
  }
  .focus-card .meta {
    margin-top: auto;
    font-size: 14px;
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
  }

  /* highlight summary list (slide 1) */
  .highlight-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 32px;
  }
  .highlight-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .highlight-list li {
    position: relative;
    padding-left: 26px;
    font-size: 18px;
    color: var(--text);
    line-height: 1.6;
  }
  .highlight-list li::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 11px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 999px;
  }
  .highlight-list li:first-child::before { background: var(--accent-2); }

  /* ========== Tables (Slide 2 / 4) ========== */
  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: 16px;
  }
  .table thead th {
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mute);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-3);
  }
  .table tbody td {
    padding: 14px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
  }
  .table tbody tr:last-child td { border-bottom: none; }
  .table .name-cell { font-weight: 600; }
  .table .owner-cell { color: var(--text-dim); }
  .table .date-cell { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

  /* Progress bars */
  .pbar-cell { width: 130px; }
  .pbar {
    position: relative;
    height: 7px;
    background: #1f1f1f;
    border-radius: 999px;
    overflow: hidden;
  }
  .pbar > span {
    position: absolute;
    inset: 0 auto 0 0;
    background: var(--accent);
    border-radius: 999px;
  }
  .pbar.done > span { background: var(--accent-2); }
  .pbar.partial > span { background: var(--accent); }
  .pbar.idle > span { background: var(--text-mute); opacity: 0.5; }
  .pbar-label {
    margin-top: 5px;
    font-size: 13px;
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Status pill */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-2);
    color: var(--text-dim);
  }
  .pill.done { color: var(--accent-2); border-color: rgba(16,185,129,0.45); background: rgba(16,185,129,0.08); }
  .pill.progress { color: var(--accent); border-color: rgba(56,189,248,0.45); background: rgba(56,189,248,0.08); }
  .pill.dot::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 999px;
    background: currentColor;
  }

  /* Slide 2 section label */
  .section-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 6px 0 10px;
  }
  .section-strip .lbl {
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .section-strip .lbl.dim {
    color: var(--text-mute);
  }
  .section-strip .meta { font-size: 14px; color: var(--text-mute); font-family: 'JetBrains Mono', monospace; }

  .phase-block { margin-bottom: 16px; }

  /* Phase 2 cards */
  .p2-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .p2-grid-tall { flex: 1; align-items: stretch; }
  .p2-grid-tall .p2-card { padding: 32px 36px; gap: 18px; }
  .p2-grid-tall .p2-title { font-size: 24px; }
  .p2-grid-tall .p2-row { font-size: 16px; }
  .p2-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .p2-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .p2-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .p2-owner {
    font-size: 13px;
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
  }
  .p2-row {
    display: flex;
    gap: 12px;
    font-size: 15px;
    line-height: 1.5;
  }
  .p2-label {
    flex: 0 0 78px;
    color: var(--text-mute);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    padding-top: 4px;
  }
  .p2-text { color: var(--text); flex: 1; }
  .p2-bars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 4px;
  }
  .p2-blabel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-mute);
    margin-bottom: 6px;
  }

  /* ========== Slide 3: repo health ========== */
  .repo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    flex: 1;
  }
  .repo-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .repo-card .row { display: flex; align-items: baseline; gap: 10px; }
  .repo-card .type {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .repo-card .repo-name {
    font-size: 21px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .repo-card .tech {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
  }
  .repo-card .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 4px;
  }
  .repo-stat {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .repo-stat .h {
    font-size: 12px;
    color: var(--text-mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .repo-stat .v {
    font-size: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.45;
  }

  /* ========== Slide 4: AI skills matrix ========== */
  .matrix-wrap {
    display: grid;
    grid-template-columns: 1.7fr 1fr;
    gap: 22px;
    flex: 1;
    min-height: 0;
  }
  .standards-card { gap: 14px; }
  .matrix .check {
    text-align: center;
    font-size: 18px;
    color: var(--accent-2);
  }
  .matrix .check.no { color: var(--text-mute); }
  .matrix td.note { color: var(--text-dim); font-size: 14px; line-height: 1.45; }
  /* Row action button (slide 4 — view progress link) */
  .matrix tbody tr.linkable { transition: background 0.15s ease; }
  .matrix tbody tr.linkable:hover { background: rgba(56,189,248,0.04); }
  .action-cell { text-align: center; }
  .row-action {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    background: var(--accent);
    color: #03131c;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.02em;
    padding: 7px 14px;
    border-radius: 999px;
    box-shadow: 0 0 0 1px rgba(56,189,248,0.4), 0 4px 12px rgba(56,189,248,0.18);
    transition: all 0.15s ease;
  }
  .row-action:hover {
    background: #7dd3fc;
    transform: translateY(-1px);
    box-shadow: 0 0 0 1px rgba(125,211,252,0.6), 0 6px 16px rgba(56,189,248,0.32);
  }
  .row-action-arrow {
    font-size: 13px;
    font-weight: 700;
  }
  .row-action-empty {
    display: inline-block;
    font-size: 12px;
    color: var(--text-mute);
    letter-spacing: 0.05em;
  }

  .standards-card { display: flex; flex-direction: column; gap: 12px; }
  .standard-item {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 16px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .standard-item .t {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  .standard-item .d { font-size: 14px; color: var(--text-dim); line-height: 1.6; }

  /* ========== Slide 5: timeline ========== */
  .timeline {
    position: relative;
    padding-left: 28px;
    flex: 1;
    overflow: hidden;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 6px;
    bottom: 6px;
    width: 1px;
    background: var(--border-2);
  }
  .tl-item {
    position: relative;
    padding: 10px 0 22px 8px;
  }
  .tl-item::before {
    content: '';
    position: absolute;
    left: -23px;
    top: 18px;
    width: 10px; height: 10px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(56,189,248,0.15);
  }
  .tl-item.success::before { background: var(--accent-2); box-shadow: 0 0 0 4px rgba(16,185,129,0.15); }
  .tl-item.current::before {
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(56,189,248,0.25), 0 0 14px rgba(56,189,248,0.45);
  }
  .now-tag {
    display: inline-block;
    margin-left: 10px;
    background: var(--accent);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 2px 8px;
    border-radius: 4px;
    vertical-align: middle;
  }
  .tl-item .when {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .tl-item.success .when { color: var(--accent-2); }
  .tl-item .what {
    font-size: 20px;
    font-weight: 600;
    margin: 6px 0 6px;
    letter-spacing: -0.01em;
  }
  .tl-item .detail {
    font-size: 16px;
    color: var(--text-dim);
    line-height: 1.65;
  }

  /* Footer / nav */
  .nav {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(20,20,20,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    z-index: 50;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .nav button {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-2);
    border-radius: 999px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav button:hover { border-color: var(--accent); color: var(--accent); }
  .nav .pos { min-width: 50px; text-align: center; letter-spacing: 0.08em; }
  .nav .dots { display: flex; gap: 6px; }
  .nav .dots span {
    width: 6px; height: 6px;
    border-radius: 999px;
    background: var(--border-2);
    transition: all 0.2s;
  }
  .nav .dots span.active { background: var(--accent); width: 18px; }

  .corner-brand {
    position: fixed;
    top: 14px;
    right: 18px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-mute);
    letter-spacing: 0.1em;
    z-index: 40;
  }

  /* Open-modal button */
  .open-modal-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.45);
    color: var(--accent);
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .open-modal-btn:hover {
    background: rgba(56,189,248,0.18);
    border-color: var(--accent);
    color: #fff;
  }
  .open-modal-btn .icon {
    font-size: 16px;
    line-height: 1;
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s ease;
    padding: 32px;
  }
  .modal-overlay.open {
    display: flex;
    opacity: 1;
  }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 16px;
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 36px 40px;
    position: relative;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    transform: translateY(10px) scale(0.98);
    transition: transform 0.2s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-close {
    position: absolute;
    top: 18px;
    right: 18px;
    background: transparent;
    border: 1px solid var(--border-2);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 999px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  .modal-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);

  const dots = document.getElementById('navDots');
  dots.innerHTML = renderers.map((_, i) => `<span class="${i===0?'active':''}" data-i="${i}"></span>`).join('');
  dots.querySelectorAll('span').forEach(el => {
    el.addEventListener('click', () => goTo(Number(el.dataset.i)));
  });

  document.getElementById('prevBtn').addEventListener('click', prev);
  document.getElementById('nextBtn').addEventListener('click', next);

  document.addEventListener('keydown', (e) => {
    const modalOpen = document.getElementById('standardsModal').classList.contains('open');
    if (e.key === 'Escape' && modalOpen) { e.preventDefault(); closeStandardsModal(); return; }
    if (modalOpen) return; // don't navigate slides while modal is open
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
    if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    if (e.key === 'End') { e.preventDefault(); goTo(renderers.length - 1); }
  });

  // Pre-populate modal list once
  const modalList = document.getElementById('modalList');
  modalList.innerHTML = slideData.aiSkills.standards.map((st, i) => `
    <div class="modal-std">
      <div class="n">${String(i+1).padStart(2,'0')}</div>
      <div class="t">${esc(st.name)}</div>
      <div class="d">${esc(st.criterion)}</div>
    </div>
  `).join('');

  updateNav();
  fitStage();
  window.addEventListener('resize', fitStage);
}

function goTo(i) {
  if (i < 0 || i >= renderers.length || i === currentIndex) return;
  const slides = document.querySelectorAll('.slide');
  slides[currentIndex].classList.remove('active');
  slides[i].classList.add('active');
  currentIndex = i;
  updateNav();
}
function next() { goTo(currentIndex + 1); }
function prev() { goTo(currentIndex - 1); }

function updateNav() {
  const pos = document.getElementById('navPos');
  pos.textContent = `${String(currentIndex+1).padStart(2,'0')} / ${String(renderers.length).padStart(2,'0')}`;
  document.querySelectorAll('.nav .dots span').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
  });
}

function fitStage() {
  const wrap = document.getElementById('slideWrap');
  const stage = document.getElementById('stage');
  const sw = wrap.offsetWidth;
  const sh = wrap.offsetHeight;
  const vw = stage.offsetWidth - 40;
  const vh = stage.offsetHeight - 80;
  const scale = Math.min(vw / sw, vh / sh, 1);
  wrap.style.transform = `scale(${scale})`;
}

// Modal open/close — exposed for inline onclick handlers
function openStandardsModal() {
  document.getElementById('standardsModal').classList.add('open');
}
function closeStandardsModal() {
  document.getElementById('standardsModal').classList.remove('open');
}
window.openStandardsModal = openStandardsModal;
window.closeStandardsModal = closeStandardsModal;

document.addEventListener('DOMContentLoaded', mount);
</script>
</body>
</html>
