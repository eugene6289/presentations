<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>組內提升計畫 · 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-2: #141414;
      --bg-3: #1a1a1a;
      --border: #262626;
      --border-2: #333;
      --text: #f5f5f5;
      --text-dim: #a3a3a3;
      --text-mute: #737373;
      --accent: #38bdf8;
      --accent-2: #10b981;
      --accent-warn: #fbbf24;
      --accent-danger: #f43f5e;
      --slide-w: 1280px;
      --slide-h: 720px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide-wrap {
      width: var(--slide-w);
      height: var(--slide-h);
      transform-origin: center center;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      padding: 48px 64px;
      background: var(--bg);
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.35s ease;
      font-size: 18px;
    }

    .slide.active { display: flex; opacity: 1; }

    /* Cover */
    .cover-slide {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      background:
        radial-gradient(1000px 500px at 30% 30%, rgba(56,189,248,0.08), transparent 60%),
        radial-gradient(800px 400px at 80% 80%, rgba(16,185,129,0.06), transparent 60%);
    }

    .cover-center {
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
    }

    .cover-rule {
      width: 72px; height: 4px;
      background: var(--accent);
      border-radius: 999px;
    }

    .cover-title {
      margin: 0;
      font-size: 68px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: var(--text);
      text-align: center;
    }

    .cover-sub {
      font-size: 20px;
      color: var(--text-dim);
      font-weight: 400;
      text-align: center;
    }

    .cover-date-bottom {
      position: absolute;
      bottom: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.22em;
      color: var(--text-mute);
    }

    /* Header */
    .slide-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .slide-header .left { display: flex; flex-direction: column; gap: 6px; }

    .eyebrow {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .slide-title {
      font-size: 36px; font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0; line-height: 1.15;
    }

    .slide-subtitle {
      font-size: 17px;
      color: var(--text-dim);
      margin-top: 4px; font-weight: 400;
    }

    .slide-header .right {
      text-align: right;
      color: var(--text-mute);
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }

    .slide-body {
      flex: 1; display: flex;
      flex-direction: column;
      min-height: 0; overflow: hidden;
    }

    .card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
    }

    /* Pills */
    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
      padding: 5px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.06); color: var(--text-dim);
    }
    .pill.done { color: var(--accent-2); background: rgba(16,185,129,0.14); }
    .pill.progress { color: var(--accent); background: rgba(56,189,248,0.14); }
    .pill.dot::before {
      content: ''; display: inline-block;
      width: 6px; height: 6px; border-radius: 999px;
      background: currentColor;
    }

    /* Q3 */
    .q3-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px; flex: 1;
    }
    .q3-card {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 36px 40px;
      display: flex; flex-direction: column; gap: 18px;
      position: relative; overflow: hidden;
    }
    .q3-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 12px 12px 0 0;
    }
    .q3-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
      color: var(--accent); text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }
    .q3-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin: 0; }
    .q3-desc { font-size: 16px; color: var(--text-dim); line-height: 1.7; flex: 1; }
    .q3-chain { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .q3-chain-step {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text); background: var(--bg-3);
      border: 1px solid var(--border-2); border-radius: 6px; padding: 5px 10px;
    }
    .q3-chain-arrow { color: var(--accent); font-size: 14px; font-weight: 700; }
    .q3-hl { color: var(--accent); font-weight: 600; }

    /* Future outlook */
    .future-body {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0 20px; gap: 28px; position: relative;
    }
    .future-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 120px; font-weight: 700;
      color: var(--border-2); line-height: 1;
      letter-spacing: -0.05em; user-select: none;
      position: absolute; top: -10px; right: 0; opacity: 0.6;
    }
    .future-text {
      font-size: 26px; color: var(--text);
      line-height: 1.75; max-width: 860px; position: relative;
    }
    .future-callout-wrap {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0 20px; gap: 32px;
    }
    .future-callout-quote {
      font-size: 68px; font-weight: 700;
      color: var(--accent); letter-spacing: -0.03em; line-height: 1.1;
    }
    .future-callout-detail {
      font-size: 20px; color: var(--text-dim);
      line-height: 1.75; max-width: 740px;
    }

    /* Nav */
    .nav {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      background: rgba(20,20,20,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 14px; z-index: 50;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--text-dim);
    }
    .nav button {
      background: transparent; color: var(--text);
      border: 1px solid var(--border-2); border-radius: 999px;
      width: 28px; height: 28px; cursor: pointer;
      font-size: 14px; display: inline-flex;
      align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .nav button:hover { background: rgba(56,189,248,0.12); border-color: var(--accent); color: var(--accent); }
    .nav .pos { min-width: 50px; text-align: center; letter-spacing: 0.08em; }
    .nav .dots { display: flex; gap: 6px; }
    .nav .dots span { width: 6px; height: 6px; border-radius: 999px; background: var(--border-2); transition: all 0.2s; cursor: pointer; }
    .nav .dots span.active { background: var(--accent); width: 18px; }

    .corner-brand {
      position: fixed; top: 14px; right: 18px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.14em; color: var(--text-mute);
      text-transform: uppercase; z-index: 50;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 16px; padding: 36px 40px;
      width: 560px; max-width: 90vw;
      position: relative; max-height: 80vh; overflow-y: auto;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-mute); border-radius: 999px;
      width: 28px; height: 28px; cursor: pointer;
      font-size: 12px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }
    .modal-eyebrow {
      font-size: 11px; letter-spacing: 0.18em;
      color: var(--accent); text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace; margin-bottom: 8px;
    }
    .modal-title { font-size: 24px; font-weight: 600; margin: 0 0 8px; }
    .modal-subtitle { font-size: 15px; color: var(--text-dim); margin-bottom: 24px; }
  </style>
</head>
<body>

  <div class="corner-brand">組內提升計畫 · TEAM IMPROVEMENT</div>

  <div class="stage" id="stage">
    <div class="slide-wrap" id="slideWrap">
      <!-- Slides injected here -->
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn" aria-label="prev">‹</button>
    <span class="pos" id="navPos">01 / 07</span>
    <div class="dots" id="navDots"></div>
    <button id="nextBtn" aria-label="next">›</button>
  </div>


<script>
    const slideData = {
      cover: {
        title: "組內提升計畫",
        sub: "網頁 & 工具組 · AI Skills 研發路線",
        date: "2026 / 06 / 11"
      },

      futureOutlook: {
        statements: [
          { label: "角色轉型",  text: "網頁開發 90% 可由 AI 完成，工程師角色將往架構設計、AI 協作治理轉移。團隊最缺的不再是工程師，而是設計師、架構規劃人員與測試人員。" },
          { label: "規格文件",  text: "AI 的輸出品質高度取決於輸入品質。未來企劃、編導的規格文件將直接影響網頁產出的準確度與維護性。" },
          { label: "人仍然關鍵", text: "前端：客製化 UI 細節仍需人工把關。後端：資安防範是 AI 難以完全替代的判斷領域。" }
        ],
        callout: {
          quote: "產出容易，維護難。",
          detail: "AI 生成的程式碼增長速度遠超團隊的理解與維護能力，架構規範與測試覆蓋率將是護城河。"
        }
      },

      q3Preview: {
        initiatives: [
          {
            badge: "探索方向 01",
            title: "Skills 整合知識庫",
            desc: "將 Deploy、Code Review、CreateDoc 三項 Skill 串接為<span class=\"q3-hl\">自動化 pipeline</span>，從推送到文件產出一氣呵成。",
            chain: ["DEPLOY SKILL", "CODE REVIEW SKILL", "CREATE DOC SKILL"]
          },
          {
            badge: "探索方向 02",
            title: "企劃規格直轉頁面",
            desc: "規格書目前以 Excel 撰寫，無法直接餵給 AI。探索將規格書改為<span class=\"q3-hl\">結構化文字格式</span>，讓 AI 能直接解析並產出頁面雛型，減少人工轉譯耗損。",
            chain: ["Excel 規格書", "結構化格式", "AI 解析", "頁面雛型"]
          },
          {
            badge: "探索方向 03",
            title: "設計師直出網頁",
            desc: "承接編導規格書，美術團隊以 Figma 完成設計稿後，透過 Frontend UI Skill 直轉 HTML/Tailwind，接入現有專案，<span class=\"q3-hl\">縮短設計與開發落差</span>。",
            chain: ["FIGMA", "FRONTEND UI SKILL", "PROJECT"]
          }
        ]
      }
    };

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Renderers ─────────────────────────────────────────── */

    function renderCover() {
      const c = slideData.cover;
      return `
  <div class="cover-slide">
    <div class="cover-center">
      <div class="cover-rule"></div>
      <h1 class="cover-title">${esc(c.title)}</h1>
      <p class="cover-sub">${esc(c.sub)}</p>
    </div>
    <div class="cover-date-bottom">${esc(c.date)}</div>
  </div>`;
    }

    function renderFuture(idx) {
      const f = slideData.futureOutlook;
      const total = f.statements.length + 1;
      const pos = `${String(idx + 1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;

      if (idx === 0) {
        const c = f.callout;
        return `
  <div class="slide-header">
    <div class="left">
      <span class="eyebrow">OUTLOOK · ${pos}</span>
      <h1 class="slide-title">核心挑戰</h1>
      <div class="slide-subtitle">提升計畫 · 未來展望</div>
    </div>
  </div>
  <div class="slide-body">
    <div class="future-callout-wrap">
      <div class="future-callout-quote">${esc(c.quote)}</div>
      <div class="future-callout-detail">${esc(c.detail)}</div>
    </div>
  </div>`;
      }

      const s = f.statements[idx - 1];
      const num = String(idx).padStart(2,'0');
      return `
  <div class="slide-header">
    <div class="left">
      <span class="eyebrow">OUTLOOK · ${pos}</span>
      <h1 class="slide-title">${esc(s.label)}</h1>
      <div class="slide-subtitle">提升計畫 · 未來展望</div>
    </div>
  </div>
  <div class="slide-body">
    <div class="future-body">
      <div class="future-num">${num}</div>
      <div class="future-text">${esc(s.text)}</div>
    </div>
  </div>`;
    }

    function renderQ3() {
      const q3 = slideData.q3Preview;
      const cards = q3.initiatives.map(item => {
        const chainHtml = item.chain.map((step, i) => {
          const arrow = i < item.chain.length - 1 ? `<span class="q3-chain-arrow">→</span>` : '';
          return `<span class="q3-chain-step">${esc(step)}</span>${arrow}`;
        }).join('');
        return `
      <div class="q3-card">
        <div class="q3-badge">${esc(item.badge)}</div>
        <h3 class="q3-title">${esc(item.title)}</h3>
        <p class="q3-desc">${item.desc}</p>
        <div class="q3-chain">${chainHtml}</div>
      </div>`;
      }).join('');

      return `
  <div class="slide-header">
    <div class="left">
      <span class="eyebrow">EXPLORING · 方向探索</span>
      <h1 class="slide-title">Q3 可能研究方向</h1>
      <div class="slide-subtitle">以下為探索中的想法，非確定計畫 · 實際執行視資源與優先序調整</div>
    </div>
    <div class="right">
      <span class="pill dot" style="color:var(--accent-warn);background:rgba(251,191,36,0.12)">探索中，待確認</span>
    </div>
  </div>
  <div class="slide-body">
    <div class="q3-grid">${cards}</div>
  </div>`;
    }

    /* ── Build renderers ───────────────────────────────────── */
    const futureTotal = slideData.futureOutlook.statements.length + 1;
    const futureRenderers = Array.from({ length: futureTotal }, (_, i) => () => renderFuture(i));
    const renderers = [renderCover, ...futureRenderers, renderQ3];

    let currentIndex = 0;

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function mount() {
      const wrap = document.getElementById('slideWrap');
      wrap.innerHTML = renderers.map((fn, i) => `
    <section class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">${fn()}</section>
  `).join('');

      const dots = document.getElementById('navDots');
      dots.innerHTML = renderers.map((_, i) => `<span class="${i === 0 ? 'active' : ''}" data-i="${i}"></span>`).join('');
      dots.querySelectorAll('span').forEach(el => {
        el.addEventListener('click', () => goTo(Number(el.dataset.i)));
      });

      document.getElementById('prevBtn').addEventListener('click', prev);
      document.getElementById('nextBtn').addEventListener('click', next);

      document.addEventListener('keydown', (e) => {
        const openModals = document.querySelectorAll('.modal-overlay.open');
        const anyOpen = openModals.length > 0;
        if (e.key === 'Escape' && anyOpen) { e.preventDefault(); openModals.forEach(m => m.classList.remove('open')); return; }
        if (anyOpen) return;
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
        if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
        if (e.key === 'Home') { e.preventDefault(); goTo(0); }
        if (e.key === 'End') { e.preventDefault(); goTo(renderers.length - 1); }
      });

      updateNav();
      fitStage();
      window.addEventListener('resize', fitStage);

      const params = new URLSearchParams(window.location.search);
      const pageParam = parseInt(params.get('page'), 10);
      if (!isNaN(pageParam) && pageParam >= 1 && pageParam <= renderers.length) {
        if (pageParam - 1 !== 0) goTo(pageParam - 1);
        else history.replaceState(null, '', '?page=1');
      } else {
        history.replaceState(null, '', '?page=1');
      }
    }

    function goTo(i) {
      if (i < 0 || i >= renderers.length || i === currentIndex) return;
      const slides = document.querySelectorAll('.slide');
      slides[currentIndex].classList.remove('active');
      slides[i].classList.add('active');
      currentIndex = i;
      history.replaceState(null, '', `?page=${i + 1}`);
      updateNav();
    }
    function next() { goTo(currentIndex + 1); }
    function prev() { goTo(currentIndex - 1); }

    function updateNav() {
      document.getElementById('navPos').textContent =
        `${String(currentIndex + 1).padStart(2,'0')} / ${String(renderers.length).padStart(2,'0')}`;
      document.querySelectorAll('.nav .dots span').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
    }

    function fitStage() {
      const wrap = document.getElementById('slideWrap');
      const stage = document.getElementById('stage');
      const sw = wrap.offsetWidth, sh = wrap.offsetHeight;
      const vw = stage.offsetWidth - 40, vh = stage.offsetHeight - 80;
      const scale = Math.min(vw / sw, vh / sh, 1);
      wrap.style.transform = `scale(${scale})`;
    }

    mount();
  </script>
</body>
</html>
