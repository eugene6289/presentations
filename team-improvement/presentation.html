<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>組內提升計畫 · 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-2: #141414;
      --bg-3: #1a1a1a;
      --border: #262626;
      --border-2: #333;
      --text: #f5f5f5;
      --text-dim: #a3a3a3;
      --text-mute: #737373;
      --accent: #38bdf8;
      --accent-2: #10b981;
      --accent-warn: #fbbf24;
      --accent-danger: #f43f5e;
      --slide-w: 1280px;
      --slide-h: 720px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slide-wrap {
      width: var(--slide-w);
      height: var(--slide-h);
      transform-origin: center center;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      padding: 48px 64px;
      background: var(--bg);
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.35s ease;
      font-size: 18px;
    }

    .slide.active { display: flex; opacity: 1; }

    /* Cover */
    .cover-slide {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      background:
        radial-gradient(1000px 500px at 30% 30%, rgba(56,189,248,0.08), transparent 60%),
        radial-gradient(800px 400px at 80% 80%, rgba(16,185,129,0.06), transparent 60%);
    }

    .cover-center {
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
    }

    .cover-rule {
      width: 72px; height: 4px;
      background: var(--accent);
      border-radius: 999px;
    }

    .cover-title {
      margin: 0;
      font-size: 68px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: var(--text);
      text-align: center;
    }

    .cover-sub {
      font-size: 20px;
      color: var(--text-dim);
      font-weight: 400;
      text-align: center;
    }

    .cover-date-bottom {
      position: absolute;
      bottom: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.22em;
      color: var(--text-mute);
    }

    /* Header */
    .slide-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .slide-header .left { display: flex; flex-direction: column; gap: 6px; }

    .eyebrow {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .slide-title {
      font-size: 36px; font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0; line-height: 1.15;
    }

    .slide-subtitle {
      font-size: 17px;
      color: var(--text-dim);
      margin-top: 4px; font-weight: 400;
    }

    .slide-header .right {
      text-align: right;
      color: var(--text-mute);
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }

    .slide-body {
      flex: 1; display: flex;
      flex-direction: column;
      min-height: 0; overflow: hidden;
    }

    .card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
    }

    /* Pills */
    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
      padding: 5px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.06); color: var(--text-dim);
    }
    .pill.done { color: var(--accent-2); background: rgba(16,185,129,0.14); }
    .pill.progress { color: var(--accent); background: rgba(56,189,248,0.14); }
    .pill.dot::before {
      content: ''; display: inline-block;
      width: 6px; height: 6px; border-radius: 999px;
      background: currentColor;
    }

    /* Next chapter — 2×2 grid */
    .next-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 18px; flex: 1; min-height: 0;
    }
    .next-card {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px 32px;
      display: flex; flex-direction: column; gap: 12px;
      position: relative; overflow: hidden;
    }
    .next-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 12px 12px 0 0;
    }
    .next-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      color: var(--text-mute); text-transform: uppercase;
    }
    .next-title {
      font-size: 22px; font-weight: 700;
      color: var(--text); letter-spacing: -0.01em; line-height: 1.2;
    }
    .next-desc {
      font-size: 14px; color: var(--text-dim); line-height: 1.75; flex: 1;
    }
    .next-tags {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px;
    }
    .next-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      color: var(--text-mute); background: var(--bg-3);
      border: 1px solid var(--border); border-radius: 6px; padding: 4px 9px;
    }

    /* Nav */
    .nav {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      background: rgba(20,20,20,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 14px; z-index: 50;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--text-dim);
    }
    .nav button {
      background: transparent; color: var(--text);
      border: 1px solid var(--border-2); border-radius: 999px;
      width: 28px; height: 28px; cursor: pointer;
      font-size: 14px; display: inline-flex;
      align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .nav button:hover { background: rgba(56,189,248,0.12); border-color: var(--accent); color: var(--accent); }
    .nav .pos { min-width: 50px; text-align: center; letter-spacing: 0.08em; }
    .nav .dots { display: flex; gap: 6px; }
    .nav .dots span { width: 6px; height: 6px; border-radius: 999px; background: var(--border-2); transition: all 0.2s; cursor: pointer; }
    .nav .dots span.active { background: var(--accent); width: 18px; }

    .corner-brand {
      position: fixed; top: 14px; right: 18px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.14em; color: var(--text-mute);
      text-transform: uppercase; z-index: 50;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 16px; padding: 36px 40px;
      width: 560px; max-width: 90vw;
      position: relative; max-height: 80vh; overflow-y: auto;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-mute); border-radius: 999px;
      width: 28px; height: 28px; cursor: pointer;
      font-size: 12px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }
    .modal-eyebrow {
      font-size: 11px; letter-spacing: 0.18em;
      color: var(--accent); text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace; margin-bottom: 8px;
    }
    .modal-title { font-size: 24px; font-weight: 600; margin: 0 0 8px; }
    .modal-subtitle { font-size: 15px; color: var(--text-dim); margin-bottom: 24px; }
  </style>
</head>
<body>

  <div class="corner-brand">組內提升計畫 · TEAM IMPROVEMENT</div>

  <div class="stage" id="stage">
    <div class="slide-wrap" id="slideWrap">
      <!-- Slides injected here -->
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn" aria-label="prev">‹</button>
    <span class="pos" id="navPos">01 / 07</span>
    <div class="dots" id="navDots"></div>
    <button id="nextBtn" aria-label="next">›</button>
  </div>


<script>
    const slideData = {
      cover: {
        title: "組內提升計畫",
        sub: "網頁 & 工具組 · AI Skills 研發路線",
        date: "2026 / 06 / 11"
      },

      nextChapter: [
        {
          num: "01 · 整合 AI",
          title: "AI 深度整合",
          desc: "Skills 研發完成後，下一步是串成流程。Deploy → Code Review → CreateDoc 形成自動化 pipeline；遊戲官網與平台頁面導入瀏覽器端 AI，實現個人化互動與摘要功能。",
          tags: ["Skills Pipeline", "Browser AI", "WebMCP"]
        },
        {
          num: "02 · 網頁 UI & 效能",
          title: "UI 品質與效能基線",
          desc: "AI 加速了產出速度，但品質標準要先定好。建立 Core Web Vitals 監控與可複用 UI 元件庫，讓官網、平台頁、運營工具共享設計語言，避免越做越散。",
          tags: ["Core Web Vitals", "元件庫", "Design System"]
        },
        {
          num: "03 · 運營設定",
          title: "AI 導入運營設定",
          desc: "運營設定目前以手動操作為主，探索將 AI 整合進工作流程：搜尋功能由 AI 協助引導與推薦、公告設定以 AI 編輯器取代純文字輸入，降低操作門檻並提升設定品質。",
          tags: ["AI 搜尋引導", "AI 編輯器", "公告設定"]
        },
        {
          num: "04 · SEO / GEO",
          title: "搜尋行為轉型",
          desc: "Google AI 摘要普及後，關鍵字堆疊失效，結構化內容才能被 AI 引擎正確引用。遊戲官網從 SEO 升級到 GEO，現在佈局是提前卡位。",
          tags: ["生成式引擎優化", "結構化內容", "遊戲官網"]
        }
      ]
    };

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Renderers ─────────────────────────────────────────── */

    function renderCover() {
      const c = slideData.cover;
      return `
  <div class="cover-slide">
    <div class="cover-center">
      <div class="cover-rule"></div>
      <h1 class="cover-title">${esc(c.title)}</h1>
      <p class="cover-sub">${esc(c.sub)}</p>
    </div>
    <div class="cover-date-bottom">${esc(c.date)}</div>
  </div>`;
    }

    function renderNextChapter() {
      const cards = slideData.nextChapter.map(d => `
      <div class="next-card">
        <div class="next-num">${esc(d.num)}</div>
        <div class="next-title">${esc(d.title)}</div>
        <div class="next-desc">${esc(d.desc)}</div>
        <div class="next-tags">${d.tags.map(t => `<span class="next-tag">${esc(t)}</span>`).join('')}</div>
      </div>`).join('');

      return `
  <div class="slide-header">
    <div class="left">
      <span class="eyebrow">NEXT · Skills 研發之後</span>
      <h1 class="slide-title">四大發展方向</h1>
      <div class="slide-subtitle">運營工具 · 遊戲官網 · 遊戲平台網頁</div>
    </div>
  </div>
  <div class="slide-body">
    <div class="next-grid">${cards}</div>
  </div>`;
    }

    /* ── Build renderers ───────────────────────────────────── */
    const renderers = [renderCover, renderNextChapter];

    let currentIndex = 0;

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function mount() {
      const wrap = document.getElementById('slideWrap');
      wrap.innerHTML = renderers.map((fn, i) => `
    <section class="slide ${i === 0 ? 'active' : ''}" data-index="${i}">${fn()}</section>
  `).join('');

      const dots = document.getElementById('navDots');
      dots.innerHTML = renderers.map((_, i) => `<span class="${i === 0 ? 'active' : ''}" data-i="${i}"></span>`).join('');
      dots.querySelectorAll('span').forEach(el => {
        el.addEventListener('click', () => goTo(Number(el.dataset.i)));
      });

      document.getElementById('prevBtn').addEventListener('click', prev);
      document.getElementById('nextBtn').addEventListener('click', next);

      document.addEventListener('keydown', (e) => {
        const openModals = document.querySelectorAll('.modal-overlay.open');
        const anyOpen = openModals.length > 0;
        if (e.key === 'Escape' && anyOpen) { e.preventDefault(); openModals.forEach(m => m.classList.remove('open')); return; }
        if (anyOpen) return;
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); next(); }
        if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
        if (e.key === 'Home') { e.preventDefault(); goTo(0); }
        if (e.key === 'End') { e.preventDefault(); goTo(renderers.length - 1); }
      });

      updateNav();
      fitStage();
      window.addEventListener('resize', fitStage);

      const params = new URLSearchParams(window.location.search);
      const pageParam = parseInt(params.get('page'), 10);
      if (!isNaN(pageParam) && pageParam >= 1 && pageParam <= renderers.length) {
        if (pageParam - 1 !== 0) goTo(pageParam - 1);
        else history.replaceState(null, '', '?page=1');
      } else {
        history.replaceState(null, '', '?page=1');
      }
    }

    function goTo(i) {
      if (i < 0 || i >= renderers.length || i === currentIndex) return;
      const slides = document.querySelectorAll('.slide');
      slides[currentIndex].classList.remove('active');
      slides[i].classList.add('active');
      currentIndex = i;
      history.replaceState(null, '', `?page=${i + 1}`);
      updateNav();
    }
    function next() { goTo(currentIndex + 1); }
    function prev() { goTo(currentIndex - 1); }

    function updateNav() {
      document.getElementById('navPos').textContent =
        `${String(currentIndex + 1).padStart(2,'0')} / ${String(renderers.length).padStart(2,'0')}`;
      document.querySelectorAll('.nav .dots span').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
    }

    function fitStage() {
      const wrap = document.getElementById('slideWrap');
      const stage = document.getElementById('stage');
      const sw = wrap.offsetWidth, sh = wrap.offsetHeight;
      const vw = stage.offsetWidth - 40, vh = stage.offsetHeight - 80;
      const scale = Math.min(vw / sw, vh / sh, 1);
      wrap.style.transform = `scale(${scale})`;
    }

    mount();
  </script>
</body>
</html>
